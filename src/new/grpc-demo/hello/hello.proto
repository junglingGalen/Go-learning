syntax = "proto3";

// 声明 proto 的包名
package hello;

// 【Go 专属配置】指定生成的 Go 代码存放位置和包名
option go_package = "./hello";

// 定义请求消息
message HelloRequest {
  string name = 1;
}

// 定义响应消息
message HelloReply {
  string message = 1;
}

// 定义服务
service Greeter {
  rpc SayHello (HelloRequest) returns (HelloReply) {}
}